name: Build and Deploy PureXS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      # ── Validate Python decoder files ─────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate Python files
        run: |
          python -c "import py_compile; py_compile.compile('hb_decoder.py', doraise=True)"
          python -c "import py_compile; py_compile.compile('purexs_decoder_cli.py', doraise=True)"
          python -c "import py_compile; py_compile.compile('utils.py', doraise=True)"
          python -c "import py_compile; py_compile.compile('dicom_export.py', doraise=True)"
          echo "All Python files compile cleanly"
        shell: bash

      # ── Build .NET WPF app ────────────────────────────────────────────
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish x64 (self-contained)
        run: >
          dotnet publish PureXS.WPF/PureXS.WPF.csproj
          -c Release
          -r win-x64
          --self-contained true
          -o publish/x64

      - name: Publish x86 (self-contained)
        run: >
          dotnet publish PureXS.WPF/PureXS.WPF.csproj
          -c Release
          -r win-x86
          --self-contained true
          -o publish/x86

      # ── Bundle Python decoder files into WPF output ───────────────────
      - name: Bundle Python decoder (x64)
        run: |
          mkdir publish\x64\decoder
          copy hb_decoder.py publish\x64\decoder\
          copy purexs_decoder_cli.py publish\x64\decoder\
          copy utils.py publish\x64\decoder\
          copy dicom_export.py publish\x64\decoder\
          copy calibration_capture.py publish\x64\decoder\
          copy requirements-decoder.txt publish\x64\decoder\requirements.txt
          if exist sidexis_tone_lut.npy copy sidexis_tone_lut.npy publish\x64\decoder\
          if exist sgf_frame_gain.npy copy sgf_frame_gain.npy publish\x64\decoder\
        shell: cmd

      - name: Bundle Python decoder (x86)
        run: |
          mkdir publish\x86\decoder
          copy hb_decoder.py publish\x86\decoder\
          copy purexs_decoder_cli.py publish\x86\decoder\
          copy utils.py publish\x86\decoder\
          copy dicom_export.py publish\x86\decoder\
          copy calibration_capture.py publish\x86\decoder\
          copy requirements-decoder.txt publish\x86\decoder\requirements.txt
          if exist sidexis_tone_lut.npy copy sidexis_tone_lut.npy publish\x86\decoder\
          if exist sgf_frame_gain.npy copy sgf_frame_gain.npy publish\x86\decoder\
        shell: cmd

      # ── Write version ─────────────────────────────────────────────────
      - name: Write version.txt
        run: |
          VERSION=$(date +"%Y.%m.%d")-$(echo ${{ github.sha }} | cut -c1-7)
          echo "$VERSION" > publish/x64/version.txt
          echo "$VERSION" > publish/x86/version.txt
          echo "VERSION=$VERSION" >> $GITHUB_ENV
        shell: bash

      # ── Deploy to PureXS-releases ─────────────────────────────────────
      - name: Setup SSH deploy key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts
        shell: bash

      - name: Clone PureXS-releases
        run: |
          git clone git@github.com:${{ github.repository_owner }}/PureXS-releases.git releases-repo
        shell: bash

      - name: Stage artifacts into releases repo
        run: |
          cd releases-repo

          # Remove old binaries (keep .git, x86/, README.md, Assets/)
          # NOTE: SetupAndRun.bat is NOT excluded — CI overwrites it from source
          Get-ChildItem -Path . -Exclude '.git','x86','README.md','Assets' |
            Where-Object { $_.Name -ne '.git' } |
            Remove-Item -Recurse -Force -ErrorAction SilentlyContinue

          # Remove old x86 binaries
          if (Test-Path x86) { Remove-Item x86\* -Recurse -Force -ErrorAction SilentlyContinue }

          # Copy new x64 build into root (includes decoder/ subdirectory)
          Copy-Item -Path ..\publish\x64\* -Destination . -Recurse -Force

          # Copy new x86 build into x86/ (includes decoder/ subdirectory)
          New-Item -ItemType Directory -Path x86 -Force | Out-Null
          Copy-Item -Path ..\publish\x86\* -Destination x86\ -Recurse -Force

          # Copy SetupAndRun.bat from source (single source of truth)
          Copy-Item -Path ..\SetupAndRun.bat -Destination . -Force

          # Copy releases .gitignore from source
          Copy-Item -Path ..\releases-gitignore -Destination .\.gitignore -Force
        shell: pwsh

      - name: Commit and push to PureXS-releases
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          cd releases-repo
          git config user.name "PureXS CI"
          git config user.email "ci@purexs.local"
          git add -A
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          # Use only the first line of the source commit message (safe for shell)
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -n 1)
          git commit -m "PureXS ${VERSION} -- ${FIRST_LINE}"
          git push origin main
          echo "Deployed ${VERSION}"
        shell: bash
